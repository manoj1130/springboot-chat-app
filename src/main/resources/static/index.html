<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body>

<h2>Spring Boot Chat</h2>


<input id="receiver" placeholder="Receiver Username">
<input id="message" placeholder="Message">

<button onclick="sendMessage()">Send</button>

<div id="typing" style="color:gray; font-style:italic;"></div>

<hr>

<div id="chat"></div>

<script>

let stompClient = null;

function connect() {

    let socket = new SockJS('/chat');

    stompClient = Stomp.over(socket);

    let token = localStorage.getItem("token");

    

    let headers = {
        Authorization: "Bearer " + token
    };

    

    stompClient.connect(
        headers,
        function () {

            

            stompClient.subscribe('/user/queue/messages', function(message){

                let msg = JSON.parse(message.body);

                document.getElementById("chat").innerHTML +=
                    "<p><b>"+msg.sender+"</b>: "+msg.content+"</p>";

            });
            
            stompClient.subscribe('/user/queue/typing', function(message){

                let typing = JSON.parse(message.body);

                let typingDiv = document.getElementById("typing");

                if(typing.typing){

                    typingDiv.innerHTML =
                        "<i>" + typing.sender + " is typing...</i>";

                }else{

                    typingDiv.innerHTML = "";

                }

            });

        }
    );
}
function sendTyping(isTyping){

    let receiver = document.getElementById("receiver").value;

    stompClient.send("/app/typing",{},JSON.stringify({

        receiver:receiver,

        typing:isTyping

    }));

}
function sendMessage() {

    

    let receiver = document.getElementById("receiver").value;
    let content = document.getElementById("message").value;

    

    stompClient.send("/app/send", {}, JSON.stringify({
        receiver: receiver,
        content: content
    }));

   
}

connect();

let timer;

document.getElementById("message").addEventListener("input",function(){

    sendTyping(true);

    clearTimeout(timer);

    timer = setTimeout(function(){

        sendTyping(false);

    },1000);

});

</script>

</body>
</html>
